<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Vendas</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAARElEQVR42u3XQQ0AIAwEsMGiEvw7g4MLeKcl0DeTh8YtG6v6vYABAQMGBAwIGBAwIGBAwIGBAwIGBAwIGBAwIGBAwIDgChgA7mExC3g3FscAAAAASUVORK5CYII=">

  <style>
    /* RESET E CONFIGURAÇÕES GERAIS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: #030712;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* VÍDEO DE FUNDO E OVERLAYS */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
    }

    .dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 7, 18, 0.65);
      z-index: -2;
    }

    .dot-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: -1;
    }

    /* CONTAINER PRINCIPAL DO LOGIN COM BORDA DINÂMICA ROTEANTE */
    .login-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 3px; /* Espessura da borda dinâmica */
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Pseudo-elemento que cria a faixa de gradiente que vai rodar */
    .login-container::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        #3b82f6 90deg,
        #06b6d4 180deg,
        transparent 270deg,
        #3b82f6 360deg
      );
      animation: rotateBorder 4s linear infinite;
      z-index: 1;
    }

    /* Animação de rotação contínua da borda */
    @keyframes rotateBorder {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* CARD INTERNO (GLASSMORPHISM) */
    .login-card {
      position: relative;
      width: 100%;
      background: rgba(21, 24, 32, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      padding: 40px 32px;
      border-radius: 13px; /* Um pouco menor que o container para encaixar perfeitamente */
      z-index: 2;
    }

    /* CABEÇALHO DO CARD */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }

    .brand-logo svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 14px;
      color: #9ca3af;
      font-weight: 400;
    }

    /* FORMULÁRIO */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #6b7280;
      transition: color 0.2s ease;
    }

    .form-control {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(3, 7, 18, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: #3b82f6;
      background: rgba(3, 7, 18, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-control:focus + svg {
      color: #3b82f6;
    }

    /* MENSAGEM DE ERRO */
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    /* BOTÃO ENTRAR */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
    }

    .btn-submit:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(6, 182, 212, 0.25);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background: #374151;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* SPINNER DE LOADING */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RODAPÉ EXTERNO */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      letter-spacing: 0.3px;
    }

    .login-footer span {
      color: #6b7280;
    }
  </style>
</head>
<body>

  <video class="video-background" autoplay loop muted playsinline>
    <source src="data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAAzptb292AAAAbG12aGQAAAAA0mWe7tJlnu4AAAEAAAAC0AAAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAACXnRyYWsAAABcdGtoZAAAAAPSZZ7u0mWe7gAAAAEAAAAAAAAC0AAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAUAAAAFGlConvert_Rest_To_Base64_If_Needed" type="video/mp4">
  </video>

  <div class="dark-overlay"></div>
  <div class="dot-grid"></div>

  <div class="login-container">
    <div class="login-card">
      
      <div class="login-header">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24">
            <path d="M5 19h14V5H5v14zm-2 2V3h18v18H3zm6-7h2v5H9v-5zm4-3h2v8h-2v-8zm4-3h2v11h-2V8z"/>
          </svg>
        </div>
        <h1>Sistema de Vendas</h1>
        <p>Sistema de Faturamento & Gestão Pessoal</p>
      </div>

      <div class="error-message" id="errorMessage">
        <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <span id="errorText">Usuário ou senha incorretos.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" class="form-control" placeholder="exemplo@sistemas.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <span class="spinner" id="btnSpinner"></span>
          <span id="btnText">Entrar</span>
        </button>
      </form>

    </div>
  </div>

  <div class="login-footer">
    Acesso restrito &nbsp;©&nbsp; 2026 &nbsp;·&nbsp; <span>by Mateus Jared</span>
  </div>

  <script>
    // Configurações do Supabase extraídas do handoff técnico
    const SB_URL = "https://ylldraicfwqaxbuqihul.supabase.co";
    const SB_KEY = "sb_publishable_JmQg_sdxjS5RDQDU-2p92A_BcVI_pul";

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const btnSubmit = document.getElementById('btnSubmit');
      const btnSpinner = document.getElementById('btnSpinner');
      const btnText = document.getElementById('btnText');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // Reset de estados UI
      errorMessage.style.display = 'none';
      btnSubmit.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.style.opacity = '0.7';

      try {
        const response = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error_description || data.error || 'Falha na autenticação');
        }

        // Armazena sessão temporária no sessionStorage conforme especificação técnica
        sessionStorage.setItem('sb_token', data.access_token);
        
        // Redireciona para o core do sistema
        window.location.href = 'app.html';

      } catch (err) {
        console.error('Erro de login:', err);
        errorText.textContent = err.message === 'Failed to fetch' 
          ? 'Erro de conexão com o banco de dados.' 
          : 'E-mail ou senha inválidos.';
        errorMessage.style.display = 'flex';
        
        // Restaura estados UI
        btnSubmit.disabled = false;
        btnSpinner.style.display = 'none';
        btnText.style.opacity = '1';
      }
    }

    // Validação preventiva de sessão ativa
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('sb_token')) {
        window.location.href = 'app.html';
      }
    });
  </script>
</body>
</html>
