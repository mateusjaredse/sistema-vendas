<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema de Vendas — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d0f14;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#151820;border:1px solid #252a3a;border-radius:14px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:36px;margin-bottom:10px}
.logo-title{font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3b82f6}
.logo-sub{font-size:12px;color:#4a5568;margin-top:4px}
label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8892a4;display:block;margin-bottom:6px}
input{width:100%;background:#1c2030;border:1px solid #252a3a;border-radius:8px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s;margin-bottom:20px}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
input.erro{border-color:#ef4444}
.btn-entrar{width:100%;padding:12px;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-entrar:hover{background:#2563eb}
.msg-erro{color:#fca5a5;font-size:13px;text-align:center;margin-top:14px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-title">Sistema de Vendas</div>
    <div class="logo-sub">Faturamento & Gestão</div>
  </div>
  <label>Senha de Acesso</label>
  <input type="password" id="senha" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')entrar()"/>
  <button class="btn-entrar" onclick="entrar()">Entrar</button>
  <div class="msg-erro" id="msg-erro">❌ Senha incorreta. Tente novamente.</div>
</div>
<script>
function entrar(){
  const s=document.getElementById("senha").value;
  const input=document.getElementById("senha");
  if(s==="caioprojeto1210"){
    sessionStorage.setItem("auth","ok");
    window.location.href="app.html";
  } else {
    input.classList.add("erro");
    document.getElementById("msg-erro").style.display="block";
    input.value="";
    setTimeout(()=>input.classList.remove("erro"),1500);
  }
}
// Se já autenticado, vai direto
if(sessionStorage.getItem("auth")==="ok") window.location.href="app.html";
</script>
</body>
</html>
